# Call hierarchy benchmark — PoolManager.sol unlock function
#   lsp-bench -c benchmarks/call-hierarchy-unlock.yaml
#
# Note: incoming calls for `unlock` require the project-wide index since
# all callers are in test files (PoolSwapTest, ActionsRouter, etc.).
# textDocument/definition runs first and triggers ensure_project_cached_build()
# which warm-loads the project index. Without this, incoming calls returns empty.

