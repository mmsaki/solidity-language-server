# Solidity Language Server — PR benchmark config
# Usage: cargo build --release && lsp-bench
project: example
file: Shop.sol
line: 130
col: 26

iterations: 10
warmup: 2
timeout: 10
index_timeout: 15
output: benchmarks/latest
report: README.md

# Exclude unimplemented methods
exclude:
  - textDocument/typeDefinition
  - textDocument/implementation
  - textDocument/codeLens
  - textDocument/documentColor
  - textDocument/colorPresentation
  - textDocument/rangeFormatting
  - textDocument/onTypeFormatting

methods:
  textDocument/definition:
    line: 136
    col: 40
    expect:
      file: Shop.sol
      line: 41

  textDocument/declaration:
    line: 136
    col: 40
    expect:
      file: Shop.sol
      line: 41

  textDocument/hover:
    line: 136
    col: 40

  textDocument/references:
    line: 136
    col: 40
    expect:
      minCount: 2

  textDocument/completion:
    line: 136
    col: 38
    trigger: "."
    expect:
      containsItems:
        - label: addTax
        - label: getRefund
    # PRICE.| — member access on uint256 via `using Transaction for uint256`

  textDocument/signatureHelp:
    line: 136
    col: 45
    # Inside PRICE.addTax(TAX, TAX_BASE) — parameter info on first arg

  textDocument/documentHighlight:
    line: 136
    col: 40
    expect:
      minCount: 2
    # addTax — declaration + callsite highlights

  textDocument/inlayHint:
    line: 135
    col: 0
    endLine: 147
    endCol: 0
    expect:
      minCount: 1
    # buy() function body — parameter names + gas estimates

  textDocument/documentLink:
    expect:
      minCount: 1

  workspace/symbol:
    expect:
      minCount: 1

  textDocument/semanticTokens/range:
    startLine: 0
    startCol: 0
    line: 100
    col: 0
    # First 100 lines — library through contract declarations

  textDocument/codeAction:
    line: 264
    col: 8
    expect:
      titleContains: "Remove unused import"

  textDocument/prepareRename:
    line: 136
    col: 40
    expect:
      line: 136

  textDocument/rename:
    line: 136
    col: 40

  textDocument/formatting:
    didChange:
      - file: Shop.unformatted.snapshot
        line: 0
        col: 0

servers:
  - label: latest
    description: Latest version
    cmd: ./target/release/solidity-language-server

